<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Caballeros Premium</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,300;1,400&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
.e404-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;overflow:hidden}
.e404-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(196,30,58,.07) 0%,transparent 65%);filter:blur(80px);pointer-events:none}
.e404-num{font-family:'Cormorant Garamond',serif;font-size:clamp(8rem,22vw,18rem);font-weight:700;color:transparent;-webkit-text-stroke:1px rgba(196,30,58,.25);line-height:1;-webkit-user-select:none;user-select:none;letter-spacing:-.02em}
.e404-label{font-size:.65rem;font-weight:700;letter-spacing:.32em;text-transform:uppercase;color:var(--red);margin-bottom:1rem}
.e404-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,3vw,2.2rem);font-weight:300;color:var(--txt);margin-bottom:.75rem}
.e404-title em{font-style:italic;color:var(--red)}
.e404-sub{font-size:.8rem;letter-spacing:.08em;color:var(--txt2);max-width:340px;line-height:1.7;margin-bottom:2.5rem}
.e404-actions{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>

<nav id="nav" class="scrolled">
  <a href="index.html" class="nav-brand nav-brand-visible" id="nav-brand">
    <img src="images/logo.png" alt="Caballeros Premium">
    <span class="nav-brand-name">Caballeros</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="catalogo.html">Catálogo</a></li>
    <li><a href="sobre.html">Sobre</a></li>
    <li><a href="contato.html">Contato</a></li>
  </ul>
  <div class="nav-right">
    <button type="button" id="theme-toggle" class="theme-btn" aria-label="Alternar tema">
      <svg class="ico-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="ico-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button type="button" id="nav-hamburger" class="nav-hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu" role="dialog" aria-modal="true">
  <span class="mobile-menu-eyebrow">Caballeros Premium</span>
  <a href="index.html">Home</a>
  <a href="catalogo.html">Catálogo</a>
  <a href="sobre.html">Sobre</a>
  <a href="contato.html">Contato</a>
  <div class="mobile-menu-rule"></div>
</div>

<div class="e404-wrap">
  <div class="e404-glow"></div>
  <div class="e404-num">404</div>
  <div class="e404-label">Página não encontrada</div>
  <p class="e404-title">Essa página<br>foi para o <em>fogo.</em></p>
  <p class="e404-sub">O link que você seguiu não existe ou foi removido. Mas os molhos ainda estão aqui.</p>
  <div class="e404-actions">
    <a href="index.html" class="btn-primary">Voltar ao início</a>
    <a href="catalogo.html" class="btn-ghost">Ver Catálogo</a>
  </div>
</div>

<script>
const btn=document.getElementById('theme-toggle');
if(localStorage.getItem('caballeros-theme')==='light') document.body.classList.add('light');
btn.addEventListener('click',()=>{
  document.body.classList.toggle('light');
  localStorage.setItem('caballeros-theme',document.body.classList.contains('light')?'light':'dark');
});
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>10),{passive:true});
</script>
<script src="js/nav.js"></script>
<script defer src="https://cdn.vercel-insights.com/v1/speed-insights/script.js"></script>
</body>
</html>
