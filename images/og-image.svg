<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C41E3A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow center -->
  <ellipse cx="600" cy="315" rx="420" ry="280" fill="url(#glow)"/>

  <!-- Red accent line top -->
  <rect x="80" y="80" width="60" height="2" fill="#C41E3A"/>

  <!-- Logo image -->
  <image href="../images/logo.png" x="470" y="165" width="260" height="260" preserveAspectRatio="xMidYMid meet"/>

  <!-- Brand name -->
  <text x="600" y="490" font-family="Georgia,serif" font-size="28" font-weight="700" font-style="italic" letter-spacing="8" text-anchor="middle" fill="#F5F5F5" opacity="0.9">CABALLEROS</text>
  <text x="600" y="522" font-family="Arial,sans-serif" font-size="13" font-weight="400" letter-spacing="6" text-anchor="middle" fill="#C41E3A">PREMIUM</text>

  <!-- Bottom tagline -->
  <text x="600" y="572" font-family="Arial,sans-serif" font-size="13" letter-spacing="3" text-anchor="middle" fill="#6e6e6e">MOLHOS ARTESANAIS · PIMENTAS RARAS</text>

  <!-- Red accent line bottom -->
  <rect x="1060" y="548" width="60" height="2" fill="#C41E3A"/>
</svg>
